<!doctype html>
<!--
  dir و lang يضبطهما i18n عند الإقلاع (src/lib/i18n.ts).
  نبدأ بـ rtl/ar لأنها الافتراضية — فلا يومض الاتجاه الخاطئ قبل تحميل JS.
-->
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- لا فهرسة: نظام أعمال خاص، لا موقع عام. -->
    <meta name="robots" content="noindex, nofollow" />

    <title>OH Finance</title>
  </head>
  <body>
    <!--
      رابط التخطي — أول عنصر قابل للتركيز في الصفحة.
      مستخدم لوحة المفاتيح لا يضطر للمرور على 12 عنصر تنقّل في كل صفحة.
    -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:start-4 focus:z-[100] focus:rounded-ctrl focus:bg-accent focus:px-4 focus:py-2 focus:text-white"
    >
      تخطّي إلى المحتوى الرئيسي

    <div id="root"></div>
